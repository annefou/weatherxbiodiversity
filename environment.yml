name: weatherxbio
channels:
  - conda-forge
dependencies:
  - python=3.12
  - xarray>=2024.6
  - pandas>=2.0
  - numpy
  - matplotlib
  - scipy
  - statsmodels
  - pyarrow        # parquet I/O for dataGLMM intermediate
  - pyproj
  - netcdf4
  - cdsapi
  - requests
  - jupytext
  - jupyterlab
  - snakemake
  - pip
  - pip:
    - pygbif
